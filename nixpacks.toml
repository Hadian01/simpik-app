[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.pgsql", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.json", "php82Extensions.bcmath", "php82Extensions.zip", "nodejs_20"]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "chmod +x railway-deploy.sh",
    "./railway-deploy.sh"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
